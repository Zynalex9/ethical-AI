# Nginx reverse-proxy configuration for the Ethical AI Platform
# Place this at ./nginx.conf (mounted into the nginx container)

upstream backend_api {
    server backend:8000;
}

upstream frontend_app {
    server frontend:80;
}

# Rate limiting zone – 10 req/s per IP, shared 10 MB zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Maximum upload size (models can be large)
    client_max_body_size 110M;

    # --- API requests → FastAPI backend ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # validations can take time
    }

    # --- Docs (Swagger / ReDoc) ---
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://backend_api;
        proxy_set_header   Host $host;
    }

    # --- Health check ---
    location /health {
        proxy_pass http://backend_api;
    }

    # --- Everything else → Frontend SPA ---
    location / {
        proxy_pass         http://frontend_app;
        proxy_set_header   Host $host;
    }
}

